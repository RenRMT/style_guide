# Config file with settings that affect the whole site.
#
title: Data visualisation style guide
description: Standards, guidance and template for data visualisations
theme: just-the-docs
baseurl: "/styleguide" 
url: "https://renrmt.github.io/"
repository: RenRMT/style_guide
aux_links:
  Github repo: https://github.com/RenRMT/style_guide

# paths to logo & favicon
#logo: "/path/to/logo.png"
#favicon_ico: "/assets/images/favicon.ico"

#sidebar navigation
nav_enabled: true

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"


footer_content: 'Placeholder footer content. Lorem ipsum dolor sit amet.'

# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%b %e %Y at %I:%M %p" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html


defaults:
  - scope:
      path: "docs" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: "default"